<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="/manifest.json" />
  <title>MelamedLaw</title>

  <!-- Open Graph – WhatsApp / Facebook / social link previews -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://client.melamedlaw.co.il" />
  <meta property="og:title" content="MelamedLaw" />
  <meta property="og:description"
    content="ניהול תיקים משפטיים בצורה פשוטה ונוחה – מעקב תיקים, התראות, חתימה דיגיטלית וקשר ישיר עם המשרד." />
  <meta property="og:image" content="https://client.melamedlaw.co.il/logo512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:locale" content="he_IL" />
  <meta property="og:site_name" content="MelamedLaw" />

  <!-- Twitter Card (also used by some apps) -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="MelamedLaw" />
  <meta name="twitter:description" content="ניהול תיקים משפטיים בצורה פשוטה ונוחה" />
  <meta name="twitter:image" content="https://client.melamedlaw.co.il/logo512.png" />

  <!-- General SEO description -->
  <meta name="description"
    content="אפליקציית MelamedLaw – ניהול תיקים משפטיים, מעקב בזמן אמת, חתימה דיגיטלית וקשר ישיר עם משרד עורכי הדין." />

  <!-- Smart app redirect: mobile users → native app store -->
  <script>
    (function () {
      // Skip redirect for admin routes (lawyers/admins use the web)
      var path = window.location.pathname;
      if (path.indexOf('/AdminStack') === 0) return;

      // Skip if user explicitly chose to stay on web (?web=1)
      if (window.location.search.indexOf('web=1') !== -1) return;

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        window.location.replace('https://apps.apple.com/il/app/melamedlaw-%D7%9E%D7%A2%D7%A7%D7%91-%D7%AA%D7%99%D7%A7%D7%99%D7%9D/id6751916311');
      } else if (isAndroid) {
        window.location.replace('https://play.google.com/store/apps/details?id=com.melamedia.melamedlaw&hl=he');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
