  <!-- Smart app redirect: mobile users → native app store -->
  <script>
    (function () {
      // Skip redirect for admin routes and all public web pages
      var path = window.location.pathname;
      var publicPaths = [
        '/AdminStack',
        '/PublicSignScreen',
        '/ViewSignedDocument',
        '/Verify/Evidence',
        '/Pricing',
        '/SecurityScreen',
        '/Privacy',
        '/Continuity',
        '/Compliance',
        '/ChatBot'
      ];
      for (var i = 0; i < publicPaths.length; i++) {
        if (path.indexOf(publicPaths[i]) === 0) return;
      }

      // Skip if user explicitly chose to stay on web (?web=1)
      if (window.location.search.indexOf('web=1') !== -1) return;

      // Skip if already loaded from the mobile app's WebView
      if (window.location.search.indexOf('fromApp=true') !== -1) return;
      try {
        if (sessionStorage.getItem('lw_fromApp') === '1') return;
      } catch (e) { }

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        window.location.replace('https://apps.apple.com/il/app/melamedlaw-%D7%9E%D7%A2%D7%A7%D7%91-%D7%AA%D7%99%D7%A7%D7%99%D7%9D/id6751916311');

    })();
